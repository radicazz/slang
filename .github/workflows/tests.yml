name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-release
            os: ubuntu-latest
            build_dir: build-release
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - name: linux-debug-sanitizers
            os: ubuntu-latest
            build_dir: build-sanitized
            cmake_args: -DCMAKE_BUILD_TYPE=Debug -DSLANG_ENABLE_SANITIZERS=ON
          - name: windows-release
            os: windows-latest
            build_dir: build-release
            cmake_args: -DCMAKE_BUILD_TYPE=Release
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Install build deps
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/ci/install_linux_deps.sh

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Configure, build, and test
        shell: bash
        run: |
          bash scripts/ci/build_and_test.sh "${{ matrix.build_dir }}" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ matrix.cmake_args }}
